version: 1.0
runtime: python311

build:
  commands:
    build:
      - pip install -r backend/requirements.txt

run:
  runtime-version: "3.11"
  command: sh -c "cd backend && uvicorn main:app --host 0.0.0.0 --port 8080"
  network:
    port: 8080
    env: PORT
  env:
    - name: PYTHONDONTWRITEBYTECODE
      value: "1"
    - name: PYTHONUNBUFFERED
      value: "1"
